name: Generate capabilities and config schema

on:
  push:
    branches:
      - main

jobs:
  generate_outputs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Mint baton-ci app token
        id: ci-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BATON_CI_CLIENT_ID }}
          private-key: ${{ secrets.BATON_CI_SECRET_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ci-token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build -o connector ./cmd/baton-snowflake

      - name: Run and save config output
        run: ./connector config > config_schema.json

      - name: Setup private key
        run: |
          echo "${{ secrets.BATON_PRIVATE_KEY }}" | base64 -d > /tmp/snowflake_key.p8
          chmod 600 /tmp/snowflake_key.p8

      - name: Run and save capabilities output
        env:
          BATON_ACCOUNT_IDENTIFIER: example
          BATON_USER_IDENTIFIER: example
          BATON_ACCOUNT_URL: https://example.snowflakecomputing.com
          BATON_PRIVATE_KEY_PATH: /tmp/snowflake_key.p8
        run: ./connector --sync-secrets capabilities > baton_capabilities.json

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: 'Updating baton config schema and capabilities.'
          add: |
            config_schema.json
            baton_capabilities.json